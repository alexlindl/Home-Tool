services:
  postgres:
    image: postgres:15-alpine
    container_name: household_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-household_app}
      POSTGRES_USER: ${DB_USER:-household}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/02-seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-household} -d ${DB_NAME:-household_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: household_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-household_app}
      DB_USER: ${DB_USER:-household}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost}
      REMINDER_CHECK_INTERVAL: ${REMINDER_CHECK_INTERVAL:-300000}
      REMINDER_ADVANCE_HOURS: ${REMINDER_ADVANCE_HOURS:-24}
    env_file:
      - .env.docker

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: household_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres_data:
    driver: local
